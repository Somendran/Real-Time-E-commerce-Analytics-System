services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce-analytics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/001_create_orders_clean.sql:/docker-entrypoint-initdb.d/001_create_orders_clean.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ecommerce-analytics-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce
      DB_SSLMODE: disable
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: python -m uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-analytics-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  postgres_data:
  frontend_node_modules:
